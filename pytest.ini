[pytest]
# ── Test discovery ───────────────────────────────────────────────────
testpaths       = tests
python_files    = test_*.py
python_classes  = Test*
python_functions = test_*

# ── Output ───────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --log-cli-level=INFO
    --log-cli-format=%(asctime)s [%(levelname)s] %(name)s: %(message)s
    --log-date-format=%H:%M:%S

# ── Custom markers ───────────────────────────────────────────────────
markers =
    smoke:          Fast critical-path tests — run first
    regression:     Full regression suite
    safety:         Functional safety related test cases (ISO 26262)
    dtc:            DTC read/write/clear scenarios
    security:       UDS SecurityAccess tests
    fault_injection: Tests that deliberately inject hardware faults
    data_driven:    Parametrized data-driven test cases

# ── Timeout (requires pytest-timeout) ───────────────────────────────
timeout = 120
