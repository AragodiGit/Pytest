[behave]
# ── Test discovery ───────────────────────────────────────────────────
paths           = features
tags            = ~@wip

# ── Output ───────────────────────────────────────────────────────────
format          = progress2
stdout_capture  = false
stderr_capture  = false
log_capture     = false
logging_level   = INFO
logging_format  = %(asctime)s [%(levelname)s] %(name)s: %(message)s

# ── JUnit XML (for GitLab CI artifact) ──────────────────────────────
junit           = true
junit_directory = reports
